version: "3.8"

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    # Note: network_mode: host does NOT work on Windows Docker. Use ports.
    ports:
      - "8096:8096"
    volumes:
      - ./data/jellyfin:/config
      - ./library:/media:ro
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
    ports:
      - "7878:7878"
    volumes:
      - ./data/radarr:/config
      - ./library:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
    ports:
      - "8989:8989"
    volumes:
      - ./data/sonarr:/config
      - ./library:/media
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
    ports:
      - "9696:9696"
    volumes:
      - ./data/prowlarr:/config
    restart: unless-stopped
