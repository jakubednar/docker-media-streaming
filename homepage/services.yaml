- Media:
    - Jellyfin:
        href: http://${SERVER_IP}:8096
        description: Movies & TV
        icon: jellyfin
        widget:
          type: jellyfin
          url: http://${SERVER_IP}:8096
          key: ${JELLYFIN_API_KEY}
          enableNowPlaying: true
          enableBlocks: true

- Management:
    - Radarr:
        href: http://${SERVER_IP}:7878
        description: Movies
        icon: radarr
        widget:
          type: radarr
          url: http://${SERVER_IP}:7878
          key: ${RADARR_API_KEY}
          enableQueue: true

    - Sonarr:
        href: http://${SERVER_IP}:8989
        description: TV Shows
        icon: sonarr
        widget:
          type: sonarr
          url: http://${SERVER_IP}:8989
          key: ${SONARR_API_KEY}
          enableQueue: true

    - Prowlarr:
        href: http://${SERVER_IP}:9696
        description: Indexers
        icon: prowlarr

- Download:
    - qBittorrent:
        href: http://${SERVER_IP}:8080
        description: Torrents
        icon: qbittorrent
        widget:
          type: qbittorrent
          url: http://${SERVER_IP}:8080
          username: admin
          password: ${QBIT_PASSWORD}
          enableQueue: true

- System:
    - Portainer:
        href: http://${SERVER_IP}:9000
        description: Docker Manager
        icon: portainer
        widget:
          type: portainer
          url: http://${SERVER_IP}:9000
          key: ${PORTAINER_API_KEY}
          enableStatus: true
